name: Release Windows EXE

on:
  push:
    tags:
      - 'v*' # This workflow only runs when you push a tag like v1.0.0

jobs:
  build-windows:
    runs-on: windows-latest

    # MUST grant write permissions so the Action can upload the .exe to the Releases tab
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Frontend Dependencies
        run: npm install

      # Build the React + Tauri app (Rust compiles everything for us now!)
      - name: Build Tauri App and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'K&B Music ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
